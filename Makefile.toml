[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all"]

[tasks.doc-check]
command = "cargo"
args = ["test", "--doc"]

[tasks.check]
command = "cargo"
args = ["clippy", "--tests", "--features=sql,redis", "--examples", "--all", "--", "-D", "warnings"]
dependencies = ["doc-check", "fmt"]

[tasks.clippy-tests]
command = "cargo"
args = ["clippy", "--all", "--tests", "--features=localhost-testing,multi-threaded"]

[tasks.fmt]
command = "cargo"
args = ["fmt", "--all"]

[tasks.git_lfs_fetch]
command = "git"
args = ["lfs", "fetch"]

[tasks.git_lfs]
command = "git"
args = ["lfs", "pull"]
dependencies = ["git_lfs_fetch"]

[tasks.docs-html]
command = "cargo"
args = ["doc", "--package", "citadel_sdk", "--features=webrtc,doc-images", "--no-deps", "--release"]
dependencies = ["git_lfs"]

[tasks.pr]
dependencies = ["fmt", "clippy", "clippy-tests"]

[tasks.install-binstall]
install_crate = { crate_name = "cargo-binstall", binary = "cargo", test_arg = ["binstall", "--help"] }

[tasks.install-nextest]
command = "cargo"
args = ["binstall", "cargo-nextest", "--secure", "-y"]
dependencies = ["install-binstall"]

[tasks.test-local]
command = "cargo"
description = "Tests all available unit/integration tests locally without using SQL/redis backends and appropriate localhost network settings"
env = { "SKIP_EXT_BACKENDS" = "true" }
args = ["nextest", "run", "--features", "localhost-testing,multi-threaded"]
dependencies = ["install-nextest"]

[tasks.test]
command = "cargo"
description = "Tests all available unit/integration tests locally using SQL/redis backends and appropriate localhost network settings"
condition = { env_set = ["TESTING_SQL_SERVER_ADDR_CLIENT", "TESTING_SQL_SERVER_ADDR_SERVER"], env_not_set = ["SKIP_EXT_BACKENDS"] }
args = ["nextest", "run", "--features", "localhost-testing"]
dependencies = ["install-nextest"]

[tasks.install.mac]
command = "brew"
args = ["install", "llvm@13", "openssl", "cmake"]

[tasks.install.windows]
command = "set"
args = ["OPENSSL_ROOT_DIR=C:/Program Files/OpenSSL-Win64"]
dependencies = ["install_deps"]

[tasks.install_deps.windows]
command = "choco"
args = ["install", "-y", "llvm", "openssl", "cmake"]

[tasks.docs]
script_runner = "@duckscript"
dependencies = ["docs-html"]
script = '''
# Copy logo
cp ./resources/avarok.png ./target/doc/citadel_sdk/avarok.png
# Copy favicon
cp ./resources/favicon.png ./target/doc/citadel_sdk/favicon.png
'''

[tasks.install-llvm-tools]
command = "rustup"
args = ["component", "add", "llvm-tools-preview", "--toolchain", "nightly"]

[tasks.install-llvm-cov]
install_crate = { crate_name = "cargo-llvm-cov", binary = "cargo", test_arg = ["llvm-cov", "--help"] }
dependencies = ["install-llvm-tools"]

[tasks.cov]
command = "cargo"
description = "Used to generate coverage information. Add --html (local) or --lcov (pipeline) for an exportable report"
env = { "SKIP_EXT_BACKENDS" = "true" }
args = ["llvm-cov", "nextest", "--features=filesystem,localhost-testing,multi-threaded", "--ignore-filename-regex=\"firebase-rtdb/src/lib.rs|netbeam/src/sync/operations/net_join.rs|netbeam/src/sync/operations/net_select.rs|citadel_sdk/src/test_common.rs|citadel_wire/src/upnp_handler.rs\"", "${@}"]
dependencies = ["install-nextest", "install-llvm-cov"]

[tasks.ratchet-stability-test]
script_runner = "@duckscript"
description = "Run messenger tests multiple times to check for stability"
script = '''
# Number of iterations for stability testing
iterations = set 10

# Initialize variables
global_error_count = set 0
test_failures = map

echo Running ratchet stability test for ${iterations} iterations...
echo

# Run tests multiple times
range_vals = range 0 ${iterations}
for i in ${range_vals}
    iteration_num = calc ${i} + 1
    echo Iteration ${iteration_num}/${iterations}...
    
    # Run the tests with nextest - focus on the most racy tests
    cmd_output = exec --get-exit-code cargo nextest run --release --package citadel_crypt --retries 0 "test_messenger_racy"
    
    if not equals ${cmd_output} 0
        global_error_count = calc ${global_error_count} + 1
        echo "  FAILED (exit code: ${cmd_output})"
        
        # Simple tracking - just note which iteration failed
        map_put ${test_failures} "iteration_${iteration_num}" "failed"
    else
        echo "  All tests passed"
    end
    
    echo
end

echo ----------------------------------------
echo STABILITY TEST SUMMARY
echo ----------------------------------------  
echo Total iterations: ${iterations}
echo Total failures: ${global_error_count}
echo

if greater_than ${global_error_count} 0
    echo STABILITY TEST FAILED
    
    # List which iterations failed
    echo
    echo Failed iterations:
    keys = map_keys ${test_failures}
    keys_len = array_length ${keys}
    range_keys = range 0 ${keys_len}
    
    for k in ${range_keys}
        iteration = array_get ${keys} ${k}
        echo "  ${iteration}"
    end
    
    exit ${global_error_count}
else
    echo All tests passed in all iterations!
    echo STABILITY TEST PASSED
    exit 0
end
'''

[tasks.bump-proto-inner]
script_runner = "@rust"
description = "Bumps the version of the inner protocol. Should not be syned with the crate versions"
script = '''
//! ```cargo
use std::str::FromStr;

fn main() {
    let bump_major = std::env::var("BUMP_PROTO_CITADEL_MAJOR").ok();
    let bump_minor = std::env::var("BUMP_PROTO_CITADEL_MINOR").ok();
    let bump_patch = std::env::var("BUMP_PROTO_CITADEL_PATCH").ok();
    const MAJOR_VERS_STR: &str = "pub const MAJOR_VERSION: u8 = ";
    const MINOR_VERS_STR: &str = "pub const MINOR_VERSION: u8 = ";
    const PATCH_VERS_STR: &str = "pub const PATCH_VERSION: u8 = ";

    let cnt = bump_major.is_some() as u8 + bump_minor.is_some() as u8 + bump_patch.is_some() as u8;

    if cnt == 0 || cnt > 1 {
        panic!("Exactly one relevant environment variable must be set")
    }

    let constants_file_str = std::fs::read_to_string("./citadel_proto/src/constants.rs").unwrap();
    let mut new_constants_file = vec![];

    let mut current_major_version = None;
    let mut current_minor_version = None;
    let mut current_patch_version = None;

    // step 1: extract current values
    for line in constants_file_str.lines() {
        if let Some(major) = maybe_extract_value_for(line, MAJOR_VERS_STR) {
            current_major_version = Some(major)
        }

        if let Some(minor) = maybe_extract_value_for(line, MINOR_VERS_STR) {
            current_minor_version = Some(minor)
        }

        if let Some(patch) = maybe_extract_value_for(line, PATCH_VERS_STR) {
            current_patch_version = Some(patch)
        }

        if current_major_version.is_some()
            && current_minor_version.is_some()
            && current_patch_version.is_some()
        {
            break;
        }
    }

    let (current_major_version, current_minor_version, current_patch_version) = (
        current_major_version.unwrap(),
        current_minor_version.unwrap(),
        current_patch_version.unwrap(),
    );

    // step 2: calculate next values
    let (new_major, new_minor, new_patch) = if bump_major.is_some() {
        (current_major_version + 1, 0u8, 0u8)
    } else if bump_minor.is_some() {
        (current_major_version, current_minor_version + 1, 0u8)
    } else {
        // bump patch
        (
            current_major_version,
            current_minor_version,
            current_patch_version + 1,
        )
    };

    // step 3: begin writing the new file
    for line in constants_file_str.lines() {
        if line.contains(MAJOR_VERS_STR) {
            new_constants_file.push(format!("{}{};", MAJOR_VERS_STR, new_major));
            continue;
        }

        if line.contains(MINOR_VERS_STR) {
            new_constants_file.push(format!("{}{};", MINOR_VERS_STR, new_minor));
            continue;
        }

        if line.contains(PATCH_VERS_STR) {
            new_constants_file.push(format!("{}{};", PATCH_VERS_STR, new_patch));
            continue;
        }

        new_constants_file.push(line.to_string())
    }

    new_constants_file.push("\n".to_string());

    std::fs::write(
        "./citadel_proto/src/constants.rs",
        new_constants_file.join("\n"),
    )
    .unwrap()
}

fn maybe_extract_value_for(line: &str, line_str_name: &str) -> Option<u8> {
    if line.contains(line_str_name) {
        let current_value = line
            .split(line_str_name)
            .skip(1)
            .next()
            .unwrap()
            .trim()
            .replace(";", "");

        Some(u8::from_str(&current_value).unwrap())
    } else {
        None
    }
}
'''

[tasks.format-proto]
command = "cargo"
args = ["fmt", "--package", "citadel_proto"]

[tasks.bump-proto-major]
env = { "BUMP_PROTO_CITADEL_MAJOR" = "true" }
run_task = [
    { name = "bump-proto-inner" },
    { name = "format-proto" }
]

[tasks.bump-proto-minor]
env = { "BUMP_PROTO_CITADEL_MINOR" = "true" }
run_task = [
    { name = "bump-proto-inner" },
    { name = "format-proto" }
]

[tasks.bump-proto-patch]
env = { "BUMP_PROTO_CITADEL_PATCH" = "true" }
run_task = [
    { name = "bump-proto-inner" },
    { name = "format-proto" }
]

[tasks.publish-install-deps]
install_crate = { crate_name = "cargo-workspaces", binary = "cargo", test_arg = ["workspaces", "--help"] }

[tasks.publish-bump-version-patch]
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
command = "cargo"
args = ["workspaces", "version", "-y", "minor"]

[tasks.publish-bump-version-minor]
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
command = "cargo"
args = ["workspaces", "version", "-y", "minor"]

[tasks.publish-bump-version-major]
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
command = "cargo"
args = ["workspaces", "version", "-y", "major"]

[tasks.publish-patch]
command = "cargo"
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
args = ["workspaces", "publish", "-y", "--token", "${CARGO_REGISTRY_TOKEN}", "--no-verify", "patch", "${@}"]
dependencies = ["publish-install-deps"]

[tasks.publish-minor]
command = "cargo"
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
args = ["workspaces", "publish", "-y", "--token", "${CARGO_REGISTRY_TOKEN}", "--no-verify", "minor", "${@}"]
dependencies = ["publish-install-deps"]

[tasks.publish-major]
command = "cargo"
condition = { env_set = ["CARGO_REGISTRY_TOKEN"] }
args = ["workspaces", "publish", "-y", "--token", "${CARGO_REGISTRY_TOKEN}", "--no-verify", "major", "${@}"]
dependencies = ["publish-install-deps"]

[tasks.check-docs]
command = "cargo"
args = ["test", "--doc", "${@}"]

[tasks.install-cargo-wasix]
command = "cargo"
args = ["install", "cargo-wasix"]

[tasks.wasix-fix]
description = "If you have a wasix error, run this task to potentially fix it"
command = "cargo"
args = ["wasix", "download-toolchain"]

[tasks.test-wasm]
description = "Run WASM integration tests (requires Node.js 22+ and wasm-pack)"
script_runner = "@shell"
script = '''
# Use nvm to switch to Node.js 22 if available
if [ -s "$HOME/.nvm/nvm.sh" ]; then
  . "$HOME/.nvm/nvm.sh"
  nvm use 22 --silent || { echo "Node.js 22 not installed. Run: nvm install 22"; exit 1; }
fi
NODE_VERSION=$(node --version)
NODE_MAJOR=$(echo "$NODE_VERSION" | sed 's/v//' | cut -d. -f1)
if [ "$NODE_MAJOR" -lt 22 ]; then
  echo "Error: Node.js 22+ required (found $NODE_VERSION). Install via: nvm install 22"
  exit 1
fi
echo "Using Node.js $NODE_VERSION"
echo "--- citadel_crypt WASM tests ---"
cd citadel_crypt
wasm-pack test --node --release -- --no-default-features --test wasm_crypto
cd ..
echo "--- citadel_sdk WASM tests ---"
cd citadel_sdk
wasm-pack test --node --release -- --no-default-features --test wasm_basic_p2p --test wasm_crypto --test wasm_backend
'''

[tasks.test-wasm-integration]
description = "Run WASM integration tests against a native server (requires Chrome)"
script_runner = "@shell"
script = '''
set -e
echo "Building WASM test server..."
cargo build --example wasm_test_server --features localhost-testing --release 2>&1

echo "Starting WASM test server..."
./target/release/examples/wasm_test_server &
SERVER_PID=$!
cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
trap cleanup EXIT

sleep 2
if ! kill -0 "$SERVER_PID" 2>/dev/null; then
  echo "ERROR: Server failed to start"
  exit 1
fi
echo "Server running (PID=$SERVER_PID)"

echo "Running WASM integration tests in headless Chrome..."
cd citadel_sdk
wasm-pack test --headless --chrome --release -- --no-default-features --test wasm_c2s_connect
echo "WASM integration tests passed!"
'''

[tasks.test-wasm-p2p-docker]
description = "Run WASM P2P integration tests in Docker (native server + 2 WASM clients)"
script_runner = "@shell"
script = '''
docker compose -f ./docker/wasm_p2p.yml up --build --abort-on-container-exit --exit-code-from wasm_tests
'''

[tasks.wasix]
command = "cargo"
args = ["--config=Cargo.wasix.toml", "wasix", "${@}", "--profile=wasix"]
dependencies = ["install-nextest", "install-cargo-wasix"]

# ── Phase 4: PGO + BOLT (profile-guided + post-link optimization) ────────────────────────────────
# Training workload = the macro_throughput bench (full stack: connect + ratchet handshake +
# per-message AEAD/serialization). PGO works on all tier-1 targets, incl. aarch64. BOLT is
# x86-64-Linux-only (needs an LLVM built with BOLT); it is gated to linux and primarily exercised
# by the `release-optimized` CI workflow. Both build on the release profile (fat LTO).

[tasks.install-pgo-llvm-tools]
command = "rustup"
args = ["component", "add", "llvm-tools-preview"]

[tasks.install-cargo-pgo]
install_crate = { crate_name = "cargo-pgo", binary = "cargo", test_arg = ["pgo", "--version"] }
dependencies = ["install-pgo-llvm-tools"]

[tasks.release-pgo]
description = "PGO build: instrument + train on the macro bench, then rebuild using the gathered profiles."
dependencies = ["install-cargo-pgo"]
env = { "BENCH_MSGS" = "30000", "BENCH_LAT_ROUNDS" = "3000" }
script_runner = "@shell"
script = '''
set -euo pipefail
echo "[pgo] toolchain check:"; cargo pgo info || true
echo "[pgo] 1/2 instrument + train (cargo pgo bench) ..."
cargo pgo bench -- -p citadel_sdk --features localhost-testing,multi-threaded --bench macro_throughput
echo "[pgo] 2/2 optimized rebuild from profiles (cargo pgo optimize) ..."
cargo pgo optimize bench -- -p citadel_sdk --features localhost-testing,multi-threaded --bench macro_throughput
echo "[pgo] done. PGO-optimized bench under target/*/release/deps; profiles in target/pgo-profiles."
'''

[tasks.release-pgo-bolt]
description = "PGO + BOLT (x86-64 Linux only). Extends release-pgo with a BOLT post-link pass on the bench binary."
condition = { platforms = ["linux"] }
dependencies = ["release-pgo"]
env = { "BENCH_MSGS" = "30000", "BENCH_LAT_ROUNDS" = "3000" }
script_runner = "@shell"
script = '''
set -euo pipefail
if ! command -v llvm-bolt >/dev/null 2>&1; then
  echo "[bolt] llvm-bolt not found. BOLT needs an LLVM built with BOLT (x86-64 Linux). Skipping (PGO build above still applies)."
  exit 0
fi
FEAT="-p citadel_sdk --features localhost-testing,multi-threaded --bench macro_throughput"
echo "[bolt] 1/3 instrument the PGO-optimized bench for BOLT ..."
cargo pgo bolt build --with-pgo -- $FEAT
echo "[bolt] 2/3 run the BOLT-instrumented bench to gather profiles ..."
BIN=$(find target -type f -name 'macro_throughput-*' -perm -u+x -newer target/pgo-profiles 2>/dev/null | head -n1 || true)
if [ -z "${BIN:-}" ]; then BIN=$(ls -t target/*/release/deps/macro_throughput-* 2>/dev/null | grep -v '\.d$' | head -n1 || true); fi
if [ -n "${BIN:-}" ]; then "$BIN" --bench || true; else echo "[bolt] WARN: could not locate instrumented bench binary to run"; fi
echo "[bolt] 3/3 optimize with gathered BOLT profiles ..."
cargo pgo bolt optimize --with-pgo -- $FEAT
echo "[bolt] done. BOLT+PGO bench under target/*/release/deps."
'''